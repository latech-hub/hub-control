<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Will · Hub Control</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:#F8F8F6;color:#0A0A0B;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:16px;}
button,input,select,textarea{font-family:inherit;font-size:16px;}
.hidden{display:none!important;}

/* HEADER */
.hdr{background:#0A0A0B;color:#F8F8F6;padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.hdr-logo{font-weight:900;font-size:18px;letter-spacing:-0.02em;}
.hdr-logo span{color:#C8FF00;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.conn{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;}
.conn-ok{background:#C8FF00;color:#1a3a00;}
.conn-err{background:#E63946;color:#fff;}
.conn-wait{background:#888;color:#fff;}

/* MAIN */
.main{padding:16px;max-width:480px;margin:0 auto;}

/* CARDS */
.card{background:white;border:2px solid #0A0A0B;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:3px 3px 0 #0A0A0B;}
.card-lime{background:#EFFFCE;border-color:#0A0A0B;}
.card-red{background:#FFF0F0;border-color:#E63946;}
.card-blue{background:#EFF5FF;border-color:#0057FF;}

/* TYPOGRAPHY */
.title{font-size:20px;font-weight:900;margin-bottom:8px;}
.sub{font-size:14px;color:#666;margin-bottom:16px;}
.label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:6px;}
.big-num{font-size:56px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;}

/* BUTTONS */
.btn{border-radius:12px;padding:16px 24px;font-size:16px;font-weight:700;border:2.5px solid;cursor:pointer;width:100%;margin-bottom:10px;transition:all .1s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:active{transform:scale(.97);}
.btn-lime{background:#C8FF00;border-color:#0A0A0B;color:#0A0A0B;box-shadow:3px 3px 0 #0A0A0B;}
.btn-dark{background:#0A0A0B;border-color:#0A0A0B;color:#F8F8F6;box-shadow:3px 3px 0 #444;}
.btn-red{background:#E63946;border-color:#C0000A;color:#fff;box-shadow:3px 3px 0 #C0000A;}
.btn-green{background:#22C55E;border-color:#16A34A;color:#fff;box-shadow:3px 3px 0 #15803D;}
.btn-muted{background:white;border-color:#CCC;color:#555;}
.btn-blue{background:#0057FF;border-color:#003DB8;color:#fff;box-shadow:3px 3px 0 #003DB8;}
.btn-sm{padding:10px 16px;font-size:14px;border-radius:9px;width:auto;margin-bottom:0;}

/* STEPPER */
.stepper{display:flex;align-items:center;border:2.5px solid #0A0A0B;border-radius:12px;overflow:hidden;background:white;box-shadow:2px 2px 0 #0A0A0B;}
.step-btn{width:60px;height:60px;background:#F0EEE8;border:none;font-size:28px;font-weight:700;cursor:pointer;flex-shrink:0;}
.step-btn:active{background:#C8FF00;}
.step-val{flex:1;text-align:center;font-size:40px;font-weight:900;color:#0A0A0B;border:none;outline:none;background:transparent;font-variant-numeric:tabular-nums;}

/* PROGRESS */
.prog{height:14px;background:#EEE;border-radius:7px;overflow:hidden;border:1.5px solid #DDD;margin:10px 0;}
.prog-fill{height:100%;border-radius:7px;transition:width .4s ease;}

/* TIMER */
.timer-display{font-size:48px;font-weight:900;font-variant-numeric:tabular-nums;text-align:center;letter-spacing:.05em;color:#0057FF;}

/* GPS MAP placeholder */
.map-wrap{background:#E8F4FD;border:2px solid #0057FF;border-radius:12px;height:200px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;margin-bottom:12px;}
.map-ico{font-size:40px;}

/* STATS ROW */
.stats{display:flex;gap:10px;margin-bottom:16px;}
.stat{flex:1;background:white;border:2px solid #EEE;border-radius:12px;padding:12px 10px;text-align:center;}
.stat-val{font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;}
.stat-lbl{font-size:10px;color:#888;font-weight:700;text-transform:uppercase;margin-top:3px;}

/* SCANNER */
.scan-area{background:#0A0A0B;border-radius:12px;padding:16px;margin-bottom:12px;}
.scan-input{background:white;border:3px solid #C8FF00;border-radius:10px;padding:14px 16px;font-size:20px;font-weight:700;width:100%;outline:none;color:#0A0A0B;}
.pkg-list{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.pkg-item{background:white;border:2px solid #DDD;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;}
.pkg-status{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pkg-ok{background:#22C55E;}
.pkg-fail{background:#E63946;}
.pkg-code{font-size:14px;font-weight:700;flex:1;}
.pkg-toggle{background:none;border:2px solid #DDD;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;}
.pkg-ok-btn{border-color:#22C55E;color:#22C55E;}
.pkg-fail-btn{border-color:#E63946;color:#E63946;}

/* ROUTE */
.route-point{display:flex;gap:12px;align-items:flex-start;margin-bottom:8px;}
.route-dot{width:12px;height:12px;border-radius:50%;background:#0057FF;margin-top:4px;flex-shrink:0;}
.route-line{width:2px;background:#DDD;margin-left:5px;height:20px;}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#0A0A0B;color:white;border-radius:12px;padding:14px 22px;font-size:15px;font-weight:700;z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;border-left:4px solid #C8FF00;max-width:90vw;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* SCREEN tabs */
.screen{display:none;}
.screen.active{display:block;}
.nav{display:flex;background:white;border-top:2px solid #EEE;position:fixed;bottom:0;left:0;right:0;z-index:50;}
.nav-btn{flex:1;padding:12px 4px 16px;border:none;background:none;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.nav-btn.active{color:#0057FF;}
.nav-icon{font-size:22px;}
.content{padding-bottom:80px;}

/* Battery */
.battery{display:flex;align-items:center;gap:10px;background:#EFFFCE;border:2px solid #22C55E;border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.battery-bar{flex:1;height:20px;background:#EEE;border-radius:10px;overflow:hidden;border:2px solid #DDD;}
.battery-fill{height:100%;border-radius:8px;transition:width .3s;}

/* History */
.hist-item{background:white;border:2px solid #EEE;border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.hist-date{font-size:12px;color:#888;font-weight:700;margin-bottom:6px;}
.hist-stats{display:flex;gap:12px;flex-wrap:wrap;}
.hist-stat{font-size:13px;font-weight:700;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">WILL · <span>HUB</span></div>
  <div class="hdr-right">
    <div id="timer-mini" class="hidden" style="font-size:13px;font-weight:700;color:#C8FF00;font-variant-numeric:tabular-nums;">00:00</div>
    <div id="conn" class="conn conn-wait">● ...</div>
  </div>
</div>

<div class="content">
  <!-- SCREEN: SACA -->
  <div class="screen active" id="screen-saca">
    <div class="main" id="saca-content"></div>
  </div>

  <!-- SCREEN: RUTA (GPS) -->
  <div class="screen" id="screen-ruta">
    <div class="main">
      <div class="card">
        <div class="label">📍 Ruta GPS</div>
        <div class="title" id="ruta-status">Sin ruta activa</div>
        <div class="map-wrap" id="map-wrap">
          <div class="map-ico">🗺️</div>
          <div style="font-size:14px;color:#666;font-weight:600;">GPS inactivo</div>
        </div>
        <div class="stats">
          <div class="stat">
            <div class="stat-val" id="km-val">0.0</div>
            <div class="stat-lbl">km recorridos</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="puntos-val">0</div>
            <div class="stat-lbl">puntos GPS</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="vel-val">—</div>
            <div class="stat-lbl">km/h actual</div>
          </div>
        </div>
        <button class="btn btn-lime" id="btn-gps" onclick="toggleGPS()">📍 Iniciar tracking GPS</button>
        <button class="btn btn-muted btn-sm" style="width:100%;margin-top:6px;" onclick="resetRoute()">Resetear ruta</button>
      </div>

      <div class="card" id="battery-card">
        <div class="label">🔋 Bicicleta eléctrica</div>
        <div class="battery" style="margin-bottom:16px;">
          <span style="font-size:20px;">🔋</span>
          <div class="battery-bar">
            <div class="battery-fill" id="bat-fill" style="width:100%;background:#22C55E;"></div>
          </div>
          <span id="bat-pct" style="font-size:16px;font-weight:900;min-width:44px;">100%</span>
        </div>
        <div class="label">Batería al SALIR</div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
          <input type="range" id="bat-inicio" min="0" max="100" value="100" style="flex:1;" oninput="updateBattery()">
          <span id="bat-inicio-val" style="font-size:18px;font-weight:900;min-width:44px;">100%</span>
        </div>
        <div class="label">Batería al LLEGAR</div>
        <div style="display:flex;align-items:center;gap:12px;">
          <input type="range" id="bat-fin" min="0" max="100" value="100" style="flex:1;" oninput="updateBattery()">
          <span id="bat-fin-val" style="font-size:18px;font-weight:900;min-width:44px;">100%</span>
        </div>
        <div id="bat-consumo" style="margin-top:12px;font-size:14px;color:#666;font-weight:600;"></div>
      </div>
    </div>
  </div>

  <!-- SCREEN: HISTORIAL -->
  <div class="screen" id="screen-hist">
    <div class="main">
      <div class="card">
        <div class="title">📅 Historial</div>
        <div class="sub">Sacas de los últimos 14 días</div>
        <div id="hist-content"><div style="text-align:center;color:#888;padding:24px;">Cargando...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="nav">
  <button class="nav-btn active" id="nav-saca" onclick="showScreen('saca')">
    <span class="nav-icon">🚲</span>Saca
  </button>
  <button class="nav-btn" id="nav-ruta" onclick="showScreen('ruta')">
    <span class="nav-icon">📍</span>Ruta
  </button>
  <button class="nav-btn" id="nav-hist" onclick="showScreen('hist')">
    <span class="nav-icon">📋</span>Historial
  </button>
</div>

<div id="toast"></div>

<script>
// ── FIREBASE ──────────────────────────────────────────────────
const FB_CFG = {
  apiKey:"AIzaSyCnMwEmYvdnPksMLfY_pfPQN75OmV-FFVg",
  authDomain:"latech-hub.firebaseapp.com",
  projectId:"latech-hub",
  storageBucket:"latech-hub.firebasestorage.app",
  messagingSenderId:"964698742567",
  appId:"1:964698742567:web:b2c3d4e5f6a7b8c9d0e1f2"
};
firebase.initializeApp(FB_CFG);
const db = firebase.firestore();
const DOC = db.collection("hub").doc("state_v4");

// ── STATE ─────────────────────────────────────────────────────
let state = {conteos:[],colectas:[],sacas:[],hubClients:[],hubOrders:[],hubPayments:{}};
let gpsActive = false, gpsWatcher = null, routePoints = [], totalKm = 0;
let timerInterval = null, timerStart = null, timerElapsed = 0;
let currentSacaId = null;

const todayStr = () => {
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
};
const fmtD = d => {
  const [y,m,day] = d.split("-");
  return new Date(+y,+m-1,+day).toLocaleDateString("es-CL",{weekday:"short",day:"numeric",month:"short"});
};
const fmtTime = s => {
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), ss=s%60;
  return (h>0?String(h).padStart(2,"0")+":":"")+String(m).padStart(2,"0")+":"+String(ss).padStart(2,"0");
};
const genId = () => "id_"+Date.now()+"_"+Math.random().toString(36).slice(2,5);

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer;
function toast(msg, color="#C8FF00") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.borderLeftColor = color;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 3000);
}

// ── NAVIGATION ────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("screen-"+name).classList.add("active");
  document.getElementById("nav-"+name).classList.add("active");
  if(name === "hist") renderHist();
}

// ── FIREBASE SYNC ─────────────────────────────────────────────
function setConn(ok) {
  const el = document.getElementById("conn");
  el.textContent = ok ? "● Firebase" : "● Offline";
  el.className = "conn " + (ok ? "conn-ok" : "conn-err");
}

DOC.onSnapshot(snap => {
  if(snap.exists) {
    const remote = snap.data();
    const localOrds = (state.hubOrders||[]).length;
    const remoteOrds = (remote.hubOrders||[]).length;
    if(remoteOrds >= localOrds) {
      state = remote;
      state.sacas = state.sacas||[];
    }
    setConn(true);
    renderSaca();
    renderHist();
  }
}, () => setConn(false));

function save() {
  DOC.set(state).catch(() => setConn(false));
}

// ── TIMER ─────────────────────────────────────────────────────
function startTimer() {
  timerStart = Date.now() - timerElapsed * 1000;
  timerInterval = setInterval(() => {
    timerElapsed = Math.floor((Date.now() - timerStart) / 1000);
    const mini = document.getElementById("timer-mini");
    if(mini) { mini.textContent = fmtTime(timerElapsed); mini.classList.remove("hidden"); }
    const disp = document.getElementById("timer-disp");
    if(disp) disp.textContent = fmtTime(timerElapsed);
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function resetTimer() {
  stopTimer();
  timerElapsed = 0;
  timerStart = null;
  const mini = document.getElementById("timer-mini");
  if(mini) mini.classList.add("hidden");
}

// ── GPS ───────────────────────────────────────────────────────
function haversineKm(lat1,lon1,lat2,lon2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function toggleGPS() {
  if(gpsActive) stopGPS(); else startGPS();
}

function startGPS() {
  if(!navigator.geolocation) { toast("GPS no disponible","#E63946"); return; }
  gpsActive = true;
  document.getElementById("btn-gps").textContent = "⏹ Detener tracking GPS";
  document.getElementById("btn-gps").className = "btn btn-red";
  document.getElementById("ruta-status").textContent = "📍 GPS activo — rastreando";
  
  gpsWatcher = navigator.geolocation.watchPosition(pos => {
    const {latitude:lat, longitude:lon, speed} = pos.coords;
    
    // Add point if moved >10m from last
    if(routePoints.length > 0) {
      const last = routePoints[routePoints.length-1];
      const dist = haversineKm(last.lat, last.lon, lat, lon);
      if(dist < 0.01) return; // ignore <10m noise
      totalKm += dist;
    }
    
    routePoints.push({lat, lon, ts: Date.now()});
    
    // Update UI
    const kmEl = document.getElementById("km-val");
    const ptsEl = document.getElementById("puntos-val");
    const velEl = document.getElementById("vel-val");
    if(kmEl) kmEl.textContent = totalKm.toFixed(2);
    if(ptsEl) ptsEl.textContent = routePoints.length;
    if(velEl) velEl.textContent = speed ? (speed*3.6).toFixed(1) : "—";
    
    // Update map placeholder
    const map = document.getElementById("map-wrap");
    if(map) map.innerHTML = `<div class="map-ico">📍</div><div style="font-size:13px;color:#0057FF;font-weight:700;">${routePoints.length} puntos · ${totalKm.toFixed(2)} km</div><div style="font-size:11px;color:#888;margin-top:4px;">${lat.toFixed(5)}, ${lon.toFixed(5)}</div>`;
    
  }, err => {
    toast("Error GPS: " + err.message, "#E63946");
    stopGPS();
  }, {enableHighAccuracy:true, maximumAge:5000, timeout:10000});
}

function stopGPS() {
  if(gpsWatcher !== null) navigator.geolocation.clearWatch(gpsWatcher);
  gpsActive = false;
  gpsWatcher = null;
  document.getElementById("btn-gps").textContent = "📍 Iniciar tracking GPS";
  document.getElementById("btn-gps").className = "btn btn-lime";
  document.getElementById("ruta-status").textContent = "GPS detenido";
  toast("GPS detenido — " + totalKm.toFixed(2) + " km registrados");
}

function resetRoute() {
  if(!confirm("¿Resetear ruta GPS?")) return;
  stopGPS();
  routePoints = [];
  totalKm = 0;
  const kmEl = document.getElementById("km-val");
  const ptsEl = document.getElementById("puntos-val");
  const velEl = document.getElementById("vel-val");
  if(kmEl) kmEl.textContent = "0.0";
  if(ptsEl) ptsEl.textContent = "0";
  if(velEl) velEl.textContent = "—";
  const map = document.getElementById("map-wrap");
  if(map) map.innerHTML = `<div class="map-ico">🗺️</div><div style="font-size:14px;color:#666;font-weight:600;">GPS inactivo</div>`;
}

// ── BATTERY ───────────────────────────────────────────────────
function updateBattery() {
  const inicio = parseInt(document.getElementById("bat-inicio").value);
  const fin = parseInt(document.getElementById("bat-fin").value);
  document.getElementById("bat-inicio-val").textContent = inicio + "%";
  document.getElementById("bat-fin-val").textContent = fin + "%";
  const consumo = inicio - fin;
  const pct = fin;
  const fill = document.getElementById("bat-fill");
  const pctEl = document.getElementById("bat-pct");
  if(fill) { fill.style.width = pct+"%"; fill.style.background = pct>50?"#22C55E":pct>20?"#F59E0B":"#E63946"; }
  if(pctEl) pctEl.textContent = pct+"%";
  const consumoEl = document.getElementById("bat-consumo");
  if(consumoEl) consumoEl.textContent = consumo > 0 ? `Consumo de ruta: ${consumo}% de batería` : "Sin consumo registrado";
}

// ── SCANNER ───────────────────────────────────────────────────
let sacaPkgs = {}; // {code: "entregado"|"fallido"}

function initScanner() {
  const inp = document.getElementById("scan-inp");
  if(!inp) return;
  inp.addEventListener("keydown", e => {
    if(e.key === "Enter") {
      const code = inp.value.trim();
      if(code && !sacaPkgs[code]) {
        sacaPkgs[code] = "pendiente";
        inp.value = "";
        renderPkgList();
        toast("✓ " + code + " agregado");
      } else if(sacaPkgs[code]) {
        toast("⚠ Ya registrado", "#F59E0B");
      }
    }
  });
  inp.focus();
}

function togglePkg(code) {
  if(sacaPkgs[code] === "entregado") sacaPkgs[code] = "fallido";
  else if(sacaPkgs[code] === "fallido") sacaPkgs[code] = "entregado";
  else sacaPkgs[code] = "entregado";
  renderPkgList();
}

function removePkg(code) {
  delete sacaPkgs[code];
  renderPkgList();
}

function renderPkgList() {
  const el = document.getElementById("pkg-list");
  if(!el) return;
  const codes = Object.keys(sacaPkgs);
  const entregados = codes.filter(c => sacaPkgs[c] === "entregado").length;
  const fallidos = codes.filter(c => sacaPkgs[c] === "fallido").length;
  const pendientes = codes.filter(c => sacaPkgs[c] === "pendiente").length;
  
  const counter = document.getElementById("pkg-counter");
  if(counter) counter.textContent = `${codes.length} paquetes · ${entregados} ✓ · ${fallidos} ✗ · ${pendientes} ⏳`;
  
  el.innerHTML = codes.map(code => `
    <div class="pkg-item">
      <div class="pkg-status ${sacaPkgs[code]==="entregado"?"pkg-ok":sacaPkgs[code]==="fallido"?"pkg-fail":""}"></div>
      <div class="pkg-code">${code}</div>
      <button class="pkg-toggle ${sacaPkgs[code]==="entregado"?"pkg-fail-btn":"pkg-ok-btn"}" onclick="togglePkg('${code}')">
        ${sacaPkgs[code]==="entregado"?"✗ Fallido":"✓ OK"}
      </button>
      <button style="background:none;border:none;color:#E63946;font-size:18px;cursor:pointer;padding:4px;" onclick="removePkg('${code}')">✕</button>
    </div>
  `).join("");
  
  // Update progress bar
  const total = codes.length;
  const pbar = document.getElementById("pkg-prog");
  if(pbar && total > 0) pbar.style.width = Math.round(((entregados+fallidos)/total)*100)+"%";
}

// ── RENDER SACA ───────────────────────────────────────────────
function renderSaca() {
  const el = document.getElementById("saca-content");
  if(!el) return;
  
  const hoy = todayStr();
  const sacaAbierta = (state.sacas||[]).find(s => !s.closedAt);
  
  if(!sacaAbierta) {
    // Sin saca abierta
    const pendReintento = (state.sacas||[]).filter(s => s.closedAt && s.failed > 0 && !s.toColecta && !(state.sacas||[]).find(r => r.retryOf === s.id));
    
    let h = `<div class="card card-lime">
      <div class="label">Estado</div>
      <div class="title" style="color:#2D5A00;">Sin saca activa</div>
      <div class="sub">La saca se abre desde Hub Control en el mesón</div>
    </div>`;
    
    if(pendReintento.length > 0) {
      h += `<div class="card card-red">
        <div class="label">⚠️ Paquetes fallidos pendientes</div>`;
      pendReintento.forEach(s => {
        h += `<div style="margin-bottom:12px;">
          <div style="font-size:13px;color:#666;">Saca del ${fmtD(s.date)} — ${s.failed} fallidos</div>
          <button class="btn btn-muted" style="margin-top:8px;" onclick="iniciarReintento('${s.id}')">🔄 Reintentar estos paquetes</button>
        </div>`;
      });
      h += `</div>`;
    }
    
    el.innerHTML = h;
    resetTimer();
    return;
  }
  
  // Saca abierta
  currentSacaId = sacaAbierta.id;
  const assigned = sacaAbierta.assigned;
  
  // Start timer if not running
  if(!timerInterval && !sacaAbierta.closedAt) {
    timerElapsed = sacaAbierta.timerElapsed || 0;
    startTimer();
    // Start GPS automatically
    if(!gpsActive) startGPS();
  }
  
  const entregados = Object.values(sacaPkgs).filter(v => v === "entregado").length;
  const fallidos = Object.values(sacaPkgs).filter(v => v === "fallido").length;
  const registrados = Object.keys(sacaPkgs).length;
  const pct = assigned > 0 ? Math.round((registrados/assigned)*100) : 0;
  
  let h = `
  <div class="card card-lime">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <span style="font-size:28px;">🚲</span>
      <div>
        <div class="label">Saca en curso</div>
        <div class="title" style="color:#2D5A00;">${assigned} paquetes asignados</div>
      </div>
    </div>
    <div class="timer-display" id="timer-disp">${fmtTime(timerElapsed)}</div>
    <div style="font-size:12px;color:#666;text-align:center;margin-top:4px;margin-bottom:16px;">tiempo de ruta</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-val" style="color:#22C55E;">${entregados}</div>
        <div class="stat-lbl">✓ Entregados</div>
      </div>
      <div class="stat">
        <div class="stat-val" style="color:#E63946;">${fallidos}</div>
        <div class="stat-lbl">✗ Fallidos</div>
      </div>
      <div class="stat">
        <div class="stat-val" style="color:#888;">${assigned - registrados}</div>
        <div class="stat-lbl">⏳ Sin marcar</div>
      </div>
    </div>
    <div class="prog">
      <div class="prog-fill" id="pkg-prog" style="width:${pct}%;background:${pct===100?"#22C55E":"#0057FF"};"></div>
    </div>
    <div id="pkg-counter" style="font-size:13px;color:#666;text-align:center;margin-bottom:16px;">${registrados} de ${assigned} registrados</div>
  </div>

  <div class="card">
    <div class="label">📦 Escanear / ingresar paquetes</div>
    <div class="scan-area">
      <input type="text" id="scan-inp" class="scan-input" placeholder="Escanear código → Enter" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div style="font-size:13px;color:#888;margin-bottom:12px;">Escanea el código del paquete. Luego marca si fue entregado o fallido.</div>
    <div class="pkg-list" id="pkg-list"></div>
  </div>

  <div class="card card-red">
    <div class="label">🔴 Cerrar saca del día</div>
    <div class="sub">Solo al terminar la ruta. Registra km y batería en la pestaña Ruta.</div>
    <button class="btn btn-red" onclick="confirmarCierre()">Cerrar saca — ${assigned} paquetes</button>
  </div>`;
  
  el.innerHTML = h;
  initScanner();
  renderPkgList();
}

// ── CIERRE DE SACA ────────────────────────────────────────────
function confirmarCierre() {
  const codes = Object.keys(sacaPkgs);
  const entregados = codes.filter(c => sacaPkgs[c] === "entregado").length;
  const fallidos = codes.filter(c => sacaPkgs[c] === "fallido").length;
  const saca = (state.sacas||[]).find(s => s.id === currentSacaId);
  if(!saca) { toast("Error: saca no encontrada","#E63946"); return; }
  
  const batInicio = document.getElementById("bat-inicio") ? parseInt(document.getElementById("bat-inicio").value) : null;
  const batFin = document.getElementById("bat-fin") ? parseInt(document.getElementById("bat-fin").value) : null;
  
  if(!confirm(`¿Cerrar saca?\n✓ ${entregados} entregados\n✗ ${fallidos} fallidos\n⏱ ${fmtTime(timerElapsed)}\n📍 ${totalKm.toFixed(2)} km`)) return;
  
  stopTimer();
  stopGPS();
  
  saca.delivered = entregados;
  saca.failed = fallidos;
  saca.closedAt = new Date().toISOString();
  saca.timerSeconds = timerElapsed;
  saca.kmRecorridos = parseFloat(totalKm.toFixed(2));
  saca.rutaPuntos = routePoints.length;
  saca.bateria = batInicio !== null ? {inicio: batInicio, fin: batFin, consumo: batInicio - batFin} : null;
  saca.paquetes = sacaPkgs;
  saca.statusHistory = saca.statusHistory || [];
  saca.statusHistory.push({status:"Cerrada", ts: Date.now()});
  
  save();
  toast("✅ Saca cerrada — " + entregados + " entregados, " + fallidos + " fallidos");
  
  // Reset local state
  sacaPkgs = {};
  currentSacaId = null;
  totalKm = 0;
  routePoints = [];
  timerElapsed = 0;
  
  renderSaca();
}

function iniciarReintento(sacaId) {
  const orig = (state.sacas||[]).find(s => s.id === sacaId);
  if(!orig) return;
  const nr = orig.retryCount + 1;
  if(nr > 3) { toast("Máx 3 reintentos","#E63946"); return; }
  state.sacas.push({
    id: genId(), date: todayStr(), assigned: orig.failed,
    delivered:0, failed:0, retries:[], retryOf: sacaId,
    retryCount: nr, ts: new Date().toISOString()
  });
  save();
  toast("🔄 Reintento " + nr + "/3");
  renderSaca();
}

// ── HISTORIAL ─────────────────────────────────────────────────
function renderHist() {
  const el = document.getElementById("hist-content");
  if(!el) return;
  
  // Group sacas by date
  const sacas = (state.sacas||[]);
  if(!sacas.length) {
    el.innerHTML = `<div style="text-align:center;color:#888;padding:24px;">Sin sacas registradas</div>`;
    return;
  }
  
  // Get unique dates sorted descending
  const dates = [...new Set(sacas.map(s => s.date))].sort().reverse().slice(0,14);
  
  el.innerHTML = dates.map(d => {
    const ds = sacas.filter(s => s.date === d);
    const closed = ds.filter(s => s.closedAt);
    const open = ds.filter(s => !s.closedAt);
    const totalAsig = ds.reduce((a,s) => a + (s.assigned||0), 0);
    const totalEnt = closed.reduce((a,s) => a + (s.delivered||0), 0);
    const totalFail = closed.reduce((a,s) => a + (s.failed||0), 0);
    const pct = totalAsig > 0 ? Math.round((totalEnt/totalAsig)*100) : 0;
    const totalKmD = closed.reduce((a,s) => a + (s.kmRecorridos||0), 0);
    const totalTime = closed.reduce((a,s) => a + (s.timerSeconds||0), 0);
    const color = open.length > 0 ? "#F59E0B" : pct === 100 ? "#22C55E" : pct >= 80 ? "#F59E0B" : "#E63946";
    
    return `<div class="hist-item">
      <div class="hist-date">${fmtD(d)} ${open.length > 0 ? "🟡 En curso" : ""}</div>
      <div class="prog" style="margin:6px 0;">
        <div class="prog-fill" style="width:${pct}%;background:${color};"></div>
      </div>
      <div class="hist-stats">
        <span class="hist-stat" style="color:#22C55E;">✓ ${totalEnt}</span>
        <span class="hist-stat" style="color:#E63946;">✗ ${totalFail}</span>
        <span class="hist-stat">📦 ${totalAsig}</span>
        ${totalKmD > 0 ? `<span class="hist-stat" style="color:#0057FF;">📍 ${totalKmD.toFixed(1)}km</span>` : ""}
        ${totalTime > 0 ? `<span class="hist-stat" style="color:#8B5CF6;">⏱ ${fmtTime(totalTime)}</span>` : ""}
        <span class="hist-stat" style="font-size:18px;font-weight:900;color:${color};">${pct}%</span>
      </div>
      ${ds[0]?.bateria ? `<div style="font-size:12px;color:#888;margin-top:6px;">🔋 Batería: ${ds[0].bateria.inicio}% → ${ds[0].bateria.fin}% (consumo: ${ds[0].bateria.consumo}%)</div>` : ""}
    </div>`;
  }).join("");
}

// ── INIT ──────────────────────────────────────────────────────
updateBattery();
setConn(false);
</script>
