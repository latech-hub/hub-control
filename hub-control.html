<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub Control — La Tech Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#F8F8F6;color:#0A0A0B;font-family:'Outfit',sans-serif;min-height:100vh;}
button,input,select,textarea{font-family:inherit;}
.hidden{display:none!important;}
#app{max-width:920px;margin:0 auto;padding:22px 16px;}
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:18px;border-bottom:2.5px solid #0A0A0B;}
.logo{font-family:'Fraunces',serif;font-size:21px;font-weight:900;letter-spacing:-0.02em;}
.logo span{color:#0057FF;}
.hdr-sub{font-size:12px;color:#666;margin-top:1px;font-weight:500;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.hdr-date{font-size:12px;color:#555;font-weight:600;text-align:right;}
.hdr-btn{background:white;border:2px solid #0A0A0B;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;color:#0A0A0B;cursor:pointer;box-shadow:2px 2px 0 #0A0A0B;transition:all .15s;}
.hdr-btn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 #0A0A0B;}
.tabs{display:flex;gap:3px;border-bottom:2.5px solid #0A0A0B;margin-bottom:22px;overflow-x:auto;}
.tab{background:transparent;border:none;border-bottom:3px solid transparent;padding:10px 15px;font-size:14px;font-weight:700;color:#888;cursor:pointer;margin-bottom:-2.5px;white-space:nowrap;transition:all .15s;}
.tab:hover{color:#0A0A0B;}
.tab.active{color:#0057FF;border-bottom-color:#0057FF;}
.tab.active.tw{color:#2D5A00;border-bottom-color:#C8FF00;}
.tab.active.tf-tab{color:#C0007A;border-bottom-color:#C0007A;}
.tbadge{display:inline-block;border-radius:20px;font-size:10px;font-weight:800;padding:1px 7px;margin-left:4px;}
.tb-red{background:#E63946;color:#fff;}
.tb-pink{background:#C0007A;color:#fff;}
.panel{display:none;}
.panel.active{display:block;animation:up .2s ease;}
@keyframes up{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ctx{background:#0A0A0B;color:#F8F8F6;border-radius:10px;padding:11px 18px;margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ctx-title{font-size:14px;font-weight:800;}
.ctx-sub{font-size:12px;color:#AAA;margin-left:4px;}
.ctx-pill{border-radius:20px;padding:4px 12px;font-size:12px;font-weight:800;margin-left:auto;white-space:nowrap;}
.cp-lime{background:#C8FF00;color:#1a3a00;}.cp-blue{background:#0057FF;color:#fff;}.cp-amber{background:#F59E0B;color:#0A0A0B;}.cp-white{background:#F0EEE8;color:#0A0A0B;}.cp-pink{background:#C0007A;color:#fff;}
.card{background:white;border:2px solid #0A0A0B;border-radius:14px;padding:22px 24px;margin-bottom:16px;box-shadow:3px 3px 0 #0A0A0B;}
.card-lite{background:white;border:1.5px solid #DDD;border-radius:12px;padding:16px 20px;margin-bottom:12px;}
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.kpi{background:white;border:2px solid #0A0A0B;border-radius:14px;padding:16px 20px;flex:1;min-width:110px;box-shadow:3px 3px 0 #0A0A0B;}
.kn{font-family:'Fraunces',serif;font-size:44px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;}
.kl{font-size:13px;font-weight:700;margin-top:5px;}.ks{font-size:12px;color:#777;margin-top:2px;}
.st{font-family:'Fraunces',serif;font-size:19px;font-weight:700;letter-spacing:-0.01em;margin-bottom:14px;}
.sl{font-size:11px;color:#777;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.carrier-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.carrier-grid>*{min-width:0;}
.ccard{background:white;border:2px solid #0A0A0B;border-radius:12px;padding:18px 20px;box-shadow:2px 2px 0 #0A0A0B;min-width:0;overflow:hidden;}
.ccard-name{font-size:15px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.ccard-nums{display:flex;gap:14px;}
.cn{text-align:center;}.cn-val{font-family:'Fraunces',serif;font-size:30px;font-weight:900;font-variant-numeric:tabular-nums;}
.cn-lbl{font-size:11px;color:#777;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.cb{border-radius:5px;padding:3px 9px;font-size:12px;font-weight:800;letter-spacing:.04em;flex-shrink:0;}
.ml{background:#FFE600;color:#1a1a1a;}.be{background:#0057FF;color:#fff;}.fa{background:#7B2D8B;color:#fff;}.pi{background:#00BFA5;color:#fff;}
.will-wrap{background:#EFFFCE;border:2px solid #0A0A0B;border-radius:16px;overflow:hidden;margin-bottom:24px;box-shadow:4px 4px 0 #0A0A0B;}
.will-top{background:#C8FF00;border-bottom:2px solid #0A0A0B;padding:16px 22px;display:flex;align-items:center;gap:16px;}
.will-name{font-family:'Fraunces',serif;font-size:20px;font-weight:900;letter-spacing:-.01em;}
.will-sub{font-size:12px;color:#3a5200;font-weight:600;margin-top:2px;}
.will-pct{font-family:'Fraunces',serif;font-size:58px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;margin-left:auto;}
.will-body{padding:18px 22px;}
.will-msg{border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:15px;font-weight:800;border:2px solid;}
.will-kpis{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px;}
.wk{flex:1;min-width:70px;background:white;border:2px solid #0A0A0B;border-radius:10px;padding:11px 8px;text-align:center;box-shadow:2px 2px 0 #0A0A0B;}
.wkv{font-family:'Fraunces',serif;font-size:28px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1;}
.wkl{font-size:10px;color:#666;text-transform:uppercase;font-weight:700;letter-spacing:.07em;margin-top:4px;}
.prog{height:12px;background:#DDD;border-radius:6px;overflow:hidden;border:1.5px solid #CCC;margin-bottom:5px;}
.prog-fill{height:100%;border-radius:6px;transition:width .5s ease;}
.prog-labels{display:flex;justify-content:space-between;font-size:12px;color:#666;font-weight:600;}
.trend-wrap{height:86px;}
.hist-row{background:white;border:1.5px solid #DDD;border-radius:10px;padding:11px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.hd{font-size:13px;color:#666;min-width:56px;font-weight:600;}.hp{font-family:'Fraunces',serif;font-size:13px;font-weight:700;min-width:50px;}
.hbar{flex:1;height:8px;background:#EEE;border-radius:4px;overflow:hidden;border:1px solid #DDD;}
.hfill{height:100%;border-radius:4px;}
.hpct{font-family:'Fraunces',serif;font-size:17px;font-weight:900;min-width:44px;text-align:right;}
.lbl{font-size:12px;color:#333;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.inp{background:white;border:2px solid #CCC;border-radius:9px;padding:10px 14px;color:#0A0A0B;font-size:15px;width:100%;outline:none;transition:border-color .15s;}
.inp:focus{border-color:#0057FF;}
.stepper{display:flex;align-items:center;border:2px solid #0A0A0B;border-radius:10px;overflow:hidden;background:white;box-shadow:2px 2px 0 #0A0A0B;width:100%;min-width:0;}
.step-btn{width:52px;height:52px;background:#F0EEE8;border:none;font-size:26px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;}
.step-btn:hover{background:#E0DED8;}.step-btn:active{background:#C8FF00;}
.step-val{flex:1;text-align:center;font-family:'Fraunces',serif;font-size:36px;font-weight:900;color:#0A0A0B;border:none;outline:none;background:transparent;font-variant-numeric:tabular-nums;min-width:0;width:100%;}
.btn{border-radius:9px;padding:11px 20px;font-size:14px;font-weight:700;border:2px solid;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:7px;}
.btn-blue{background:#0057FF;border-color:#0057FF;color:#fff;box-shadow:2px 2px 0 #003DB8;}
.btn-blue:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 #003DB8;}
.btn-green{background:#22C55E;border-color:#16A34A;color:#fff;box-shadow:2px 2px 0 #15803D;}
.btn-green:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 #15803D;}
.btn-amber{background:#F59E0B;border-color:#D97706;color:#fff;box-shadow:2px 2px 0 #B45309;}
.btn-red-out{background:white;border-color:#E63946;color:#E63946;}
.btn-red-out:hover{background:#FEE2E2;}
.btn-lime{background:#C8FF00;border-color:#0A0A0B;color:#0A0A0B;box-shadow:2px 2px 0 #0A0A0B;}
.btn-lime:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 #0A0A0B;}
.btn-dark{background:#0A0A0B;border-color:#0A0A0B;color:#F8F8F6;box-shadow:2px 2px 0 #444;}
.btn-dark:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 #444;}
.btn-muted{background:white;border-color:#CCC;color:#555;}
.btn-muted:hover{border-color:#888;color:#0A0A0B;}
.btn-purple{background:#8B5CF6;border-color:#7C3AED;color:#fff;box-shadow:2px 2px 0 #6D28D9;}
.btn-purple:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 #6D28D9;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.period-bar{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.pchip{background:white;border:2px solid #CCC;border-radius:20px;padding:6px 15px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;color:#666;}
.pchip.active{background:#0A0A0B;border-color:#0A0A0B;color:#F8F8F6;}
.tbl{width:100%;border-collapse:collapse;font-size:14px;}
.tbl th{text-align:left;padding:10px 12px;color:#555;font-weight:700;border-bottom:2px solid #0A0A0B;font-size:11px;text-transform:uppercase;letter-spacing:.08em;}
.tbl td{padding:11px 12px;border-bottom:1px solid #EEE;}
.tbl tr:hover td{background:#FAFAF8;}
.alert{background:#FFF0F0;border:2px solid #E63946;border-radius:12px;padding:16px 20px;margin-bottom:18px;}
.alert-t{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:#C0000A;margin-bottom:10px;}
.colecta-box{background:#F5F0FF;border:2px solid #8B5CF6;border-radius:12px;padding:20px 22px;margin-bottom:16px;}
.empty{background:white;border:2px dashed #CCC;border-radius:12px;padding:32px;text-align:center;color:#888;font-size:15px;margin-bottom:14px;}
#toast{position:fixed;bottom:22px;right:22px;background:#0A0A0B;color:white;border-radius:10px;padding:13px 20px;font-size:14px;font-weight:700;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;border-left:4px solid #0057FF;}
#toast.show{opacity:1;transform:translateY(0);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.modal{background:#F8F8F6;border:2px solid #0A0A0B;border-radius:16px;padding:28px;max-width:460px;width:100%;box-shadow:6px 6px 0 #0A0A0B;max-height:90vh;overflow-y:auto;}
.retry-track{display:flex;gap:6px;margin:4px 0;}
.rt-dot{width:32px;height:10px;border-radius:4px;}
.remito-tbl{width:100%;border-collapse:collapse;font-size:14px;}
.remito-tbl th{padding:9px 12px;text-align:left;color:#555;font-weight:700;border-bottom:2px solid #0A0A0B;font-size:11px;text-transform:uppercase;letter-spacing:.07em;}
.remito-tbl td{padding:11px 12px;border-bottom:1px solid #EEE;}
.sign-row{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-top:26px;}
.sign-box{border-top:2px solid #0A0A0B;padding-top:12px;}
.subtabs{display:flex;gap:4px;border-bottom:2px solid #DDD;margin-bottom:20px;overflow-x:auto;}
.subtab{background:transparent;border:none;border-bottom:3px solid transparent;padding:10px 17px;font-size:14px;font-weight:700;color:#888;cursor:pointer;margin-bottom:-2px;white-space:nowrap;transition:all .15s;}
.subtab:hover{color:#0A0A0B;}
.subtab.active{color:#C0007A;border-bottom-color:#C0007A;}
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.svc-card{background:white;border:2.5px solid #DDD;border-radius:14px;padding:22px 18px;cursor:pointer;transition:all .15s;text-align:left;}
.svc-sel-t{border-color:#0057FF!important;background:#EFF5FF!important;box-shadow:3px 3px 0 #0057FF!important;}
.svc-sel-f{border-color:#8B5CF6!important;background:#F5F0FF!important;box-shadow:3px 3px 0 #8B5CF6!important;}
.scan-wrap{position:relative;margin-bottom:8px;}
.scan-inp{background:white;border:3px solid #0057FF;border-radius:10px;padding:13px 50px 13px 16px;font-family:'Fraunces',serif;font-size:24px;font-weight:700;width:100%;outline:none;color:#0A0A0B;}
.scan-ico{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:22px;color:#0057FF;pointer-events:none;}
.pkg-chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.pkg-chip{background:#F0EEE8;border:2px solid #0A0A0B;border-radius:20px;padding:5px 12px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:7px;}
.pkg-del{background:none;border:none;color:#E63946;cursor:pointer;font-size:14px;padding:0;line-height:1;}
.ord-card{background:white;border:2px solid #DDD;border-left:4px solid #0057FF;border-radius:12px;padding:17px 19px;margin-bottom:10px;}
.ord-fo{border-left-color:#8B5CF6;}
.spill{border-radius:20px;padding:3px 11px;font-size:12px;font-weight:800;}
.oprog{display:flex;gap:3px;margin:10px 0;}
.oseg{flex:1;height:4px;border-radius:2px;}
.bil-tbl{width:100%;border-collapse:collapse;font-size:13px;}
.bil-tbl th{padding:10px 12px;text-align:left;color:#555;font-weight:700;border-bottom:2px solid #0A0A0B;font-size:11px;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap;}
.bil-tbl td{padding:11px 12px;border-bottom:1px solid #EEE;vertical-align:middle;}
.bil-tbl tfoot td{background:#F0EEE8;border-top:2px solid #0A0A0B;font-weight:700;}
.cl-row{background:white;border:2px solid #DDD;border-radius:10px;padding:15px 18px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.pay-sel{border:2px solid #DDD;border-radius:7px;padding:6px 9px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;outline:none;}
.wk-nav{display:flex;align-items:center;gap:12px;background:white;border:2px solid #0A0A0B;border-radius:12px;padding:13px 19px;margin-bottom:20px;box-shadow:2px 2px 0 #0A0A0B;}
.sumbox{background:#F0EEE8;border:2px solid #0A0A0B;border-radius:12px;padding:17px 20px;margin-bottom:16px;}
.sumrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:15px;}
.infonote{border-radius:10px;padding:14px 18px;margin-bottom:10px;font-size:14px;line-height:1.7;}
@media(max-width:620px){.carrier-grid{grid-template-columns:1fr;}.kpi{min-width:calc(50% - 8px);}.kn{font-size:36px;}.will-pct{font-size:44px;}.wk{min-width:64px;}.svc-grid{grid-template-columns:1fr 1fr;}}
@media print{.no-print{display:none!important;}body{background:white;}.card,.kpi,.ccard,.will-wrap{box-shadow:none!important;}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr no-print">
    <div><div class="logo">LA TECH <span>HUB</span></div><div class="hdr-sub">Centro de Envíos · Las Condes, Santiago</div></div>
    <div class="hdr-right"><div class="hdr-date" id="hdr-date"></div><button class="hdr-btn" onclick="openSync()">🔄 Sync</button></div>
  </div>
  <div class="tabs no-print">
    <button class="tab active" data-tab="dashboard" onclick="st('dashboard')">📊 Dashboard</button>
    <button class="tab" data-tab="conteo" onclick="st('conteo')">📦 Conteo Diario</button>
    <button class="tab tw" data-tab="will" onclick="st('will')">🚲 Will / Saca<span class="tbadge tb-red hidden" id="badge-will">!</span></button>
    <button class="tab" data-tab="colecta" onclick="st('colecta')">🚛 Colecta<span class="tbadge tb-red hidden" id="badge-col"></span></button>
    <button class="tab tf-tab" data-tab="tf" onclick="st('tf')">⚡ Turbo &amp; Flex<span class="tbadge tb-pink hidden" id="badge-tf"></span></button>
    <button class="tab" data-tab="reporte" onclick="st('reporte')">📈 Reportes</button>
  </div>
  <div class="panel active" id="panel-dashboard"></div>
  <div class="panel" id="panel-conteo"></div>
  <div class="panel" id="panel-will"></div>
  <div class="panel" id="panel-colecta"></div>
  <div class="panel" id="panel-tf"></div>
  <div class="panel" id="panel-reporte"></div>
</div>
<div id="toast"></div>
<div class="modal-bg hidden" id="sync-modal">
  <div class="modal">
    <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:700;margin-bottom:8px;">🔄 Sincronizar entre PCs</div>
    <div style="font-size:14px;color:#555;margin-bottom:20px;line-height:1.6;">El PC del mesón es la fuente. Exporta e importa entre equipos.</div>
    <div class="lbl" style="margin-bottom:6px;">Exportar desde esta PC</div>
    <button class="btn btn-dark" style="width:100%;margin-bottom:18px;" onclick="doExport()">📋 Copiar código</button>
    <div class="lbl" style="margin-bottom:6px;">Importar desde otra PC</div>
    <textarea class="inp" id="sync-txt" rows="4" placeholder="Pega el código aquí..." style="margin-bottom:10px;font-size:13px;font-family:monospace;resize:vertical;"></textarea>
    <button class="btn btn-green" style="width:100%;margin-bottom:14px;" onclick="doImport()">📥 Importar datos</button>
    <button class="btn btn-muted" onclick="closeSync()">Cerrar</button>
  </div>
</div>
<script>
const CARRIERS={ml:{name:"Mercado Libre",short:"ML",cls:"ml",color:"#E6A800"},be:{name:"Blue Express",short:"BE",cls:"be",color:"#0057FF"},fa:{name:"Falabella",short:"FA",cls:"fa",color:"#7B2D8B"},pi:{name:"Pick It",short:"PI",cls:"pi",color:"#00BFA5"}};
const C={blue:"#0057FF",green:"#22C55E",amber:"#F59E0B",red:"#E63946",purple:"#8B5CF6",lime:"#C8FF00",pink:"#C0007A",ink:"#0A0A0B",muted:"#888",limeD:"#2D5A00"};
const SK="latech-hub-v4";
let state={conteos:[],colectas:[],sacas:[],hubClients:[],hubOrders:[],hubPayments:{}};
const todayStr=()=>{const d=new Date(new Date().toLocaleString("en-US",{timeZone:"America/Santiago"}));return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
const genId=()=>"id_"+Date.now()+"_"+Math.random().toString(36).slice(2,5);
const parseD=d=>{if(!d||typeof d!=="string")return new Date();const p=d.split("-");if(p.length!==3)return new Date();const[y,m,day]=p;return new Date(+y,+m-1,+day);};
const fmtD=d=>parseD(d).toLocaleDateString("es-CL",{day:"2-digit",month:"short"});
const fmtDL=d=>parseD(d).toLocaleDateString("es-CL",{day:"2-digit",month:"long",year:"numeric"});
const dateRange=n=>Array.from({length:n},(_,i)=>{const base=new Date(new Date().toLocaleString("en-US",{timeZone:"America/Santiago"}));base.setDate(base.getDate()-(n-1-i));return base.getFullYear()+"-"+String(base.getMonth()+1).padStart(2,"0")+"-"+String(base.getDate()).padStart(2,"0");});
const sum=(arr,fn)=>arr.reduce((a,b)=>a+(fn(b)||0),0);
const cb=c=>`<span class="cb ${CARRIERS[c]?.cls||""}">${CARRIERS[c]?.short||c}</span>`;
const fmtCLP=n=>"$"+Number(Math.round(n)).toLocaleString("es-CL");
const fmtTS=ts=>new Date(ts).toLocaleString("es-CL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
function load(){try{const s=localStorage.getItem(SK);if(s)state=JSON.parse(s);}catch(e){}state.conteos=state.conteos||[];state.colectas=state.colectas||[];state.sacas=state.sacas||[];state.hubClients=state.hubClients||[];state.hubOrders=state.hubOrders||[];state.hubPayments=state.hubPayments||{};
state.conteos=state.conteos.map(c=>{if(c.do===undefined&&c.pu===undefined){const v=c.count||0;return{...c,do:c.carrier==="pi"?0:v,pu:c.carrier==="pi"?v:0};}return c;});}
function save(){try{localStorage.setItem(SK,JSON.stringify(state));}catch(e){}}
let toastTimer;
function toast(msg,color=C.blue){const t=document.getElementById("toast");t.textContent=msg;t.style.borderLeftColor=color;t.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),3000);}
function st(id){document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));document.querySelector(`[data-tab="${id}"]`).classList.add("active");document.getElementById("panel-"+id).classList.add("active");renderAll();}
function openSync(){document.getElementById("sync-modal").classList.remove("hidden");}
function closeSync(){document.getElementById("sync-modal").classList.add("hidden");}
function doExport(){const b64=btoa(unescape(encodeURIComponent(JSON.stringify(state))));navigator.clipboard.writeText(b64).then(()=>toast("📋 Código copiado")).catch(()=>{document.getElementById("sync-txt").value=b64;toast("Cópialo del campo",C.amber);});}
function doImport(){const raw=document.getElementById("sync-txt").value.trim();if(!raw){toast("Pega el código primero",C.amber);return;}try{state=JSON.parse(decodeURIComponent(escape(atob(raw))));state.conteos=state.conteos||[];state.colectas=state.colectas||[];state.sacas=state.sacas||[];state.hubClients=state.hubClients||[];state.hubOrders=state.hubOrders||[];state.hubPayments=state.hubPayments||{};save();closeSync();renderAll();toast("✅ Datos importados");}catch(e){toast("❌ Código inválido",C.red);}}
function confirmarColecta(carrier){const hoy=todayStr();const conteo=state.conteos.find(c=>c.date===hoy&&c.carrier===carrier);if(!conteo){toast("Primero registra el conteo",C.amber);return;}const totalConteo=(conteo.do||0)+(conteo.pu||0);state.colectas.push({id:genId(),date:hoy,carrier,count:totalConteo,retornos:0,ts:new Date().toISOString()});save();toast(`🚛 Colecta ${CARRIERS[carrier].name} confirmada — ${conteo.count} paq`);renderAll();}
function abrirSaca(assigned){if(!assigned||assigned<1){toast("Ingresa cuántos paquetes lleva Will",C.amber);return;}const hoy=todayStr();if(state.sacas.find(s=>s.date===hoy&&!s.closedAt)){toast("Ya hay una saca abierta hoy.",C.amber);return;}state.sacas.push({id:genId(),date:hoy,assigned,delivered:0,failed:0,retries:[],retryOf:null,retryCount:0,ts:new Date().toISOString()});save();toast(`🚲 Saca abierta — ${assigned} paquetes`);renderAll();}
function cerrarSaca(sacaId,delivered,failed){state.sacas=state.sacas.map(s=>s.id!==sacaId?s:{...s,delivered,failed,closedAt:new Date().toISOString()});save();toast(`✅ Saca cerrada — ${delivered} entregados, ${failed} fallidos`);renderAll();}
function reintentarSaca(sacaId){const orig=state.sacas.find(s=>s.id===sacaId);if(!orig||!orig.failed)return;const nr=orig.retryCount+1;if(nr>3){toast("⚠️ Máx 3 reintentos — enviar a Colecta",C.red);return;}state.sacas.push({id:genId(),date:todayStr(),assigned:orig.failed,delivered:0,failed:0,retryOf:sacaId,retryCount:nr,ts:new Date().toISOString()});save();toast(`🔄 Reintento ${nr}/3`);renderAll();}
function enviarColectaWill(sacaId){state.sacas=state.sacas.map(s=>s.id===sacaId?{...s,toColecta:true,toColectaAt:new Date().toISOString()}:s);save();toast("📋 Enviado a remito",C.purple);renderAll();}
function trendSVG(data,colorFn){const pts=data.filter(d=>d.val!==null);if(pts.length<2)return`<div style="height:86px;display:flex;align-items:center;justify-content:center;color:#888;font-size:13px;">Sin datos suficientes aún...</div>`;const maxV=Math.max(...pts.map(d=>d.val),1),W=400,H=74,PL=4,PR=4,PT=6,PB=6;const xs=data.map((_,i)=>PL+(i/(data.length-1))*(W-PL-PR));const y=v=>PT+(1-(v/maxV))*(H-PT-PB);const pathPts=data.map((d,i)=>d.val!==null?[xs[i],y(d.val)]:null).filter(Boolean);const path="M "+pathPts.map(p=>p.join(",")).join(" L ");const dots=data.map((d,i)=>d.val===null?"":`<circle cx="${xs[i]}" cy="${y(d.val)}" r="4" fill="${colorFn(d.val)}" stroke="#0A0A0B" stroke-width="1.5"/>`).join("");return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:86px;" preserveAspectRatio="none"><path d="${path}" fill="none" stroke="#0A0A0B" stroke-width="2.5" stroke-linejoin="round"/>${dots}</svg>`;}
function barChartHTML(data){const max=Math.max(...data.map(d=>d.v),1);return`<div style="display:flex;align-items:flex-end;gap:5px;height:100px;">${data.map(d=>`<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:3px;"><div style="width:100%;border-radius:4px 4px 0 0;background:${d.color};height:${Math.max(4,Math.round((d.v/max)*90))}px;border:1.5px solid #0A0A0B;"></div><div style="font-size:10px;color:#888;font-weight:600;white-space:nowrap;">${d.label}</div></div>`).join("")}</div>`;}
function deriveData(){const hoy=todayStr();const conteoHoy=state.conteos.filter(c=>c.date===hoy),colectaHoy=state.colectas.filter(c=>c.date===hoy);const totalConteoHoy=sum(conteoHoy,c=>(c.do||0)+(c.pu||0)),totalColectaHoy=sum(colectaHoy,c=>c.count);const sacaAbierta=state.sacas.find(s=>s.date===hoy&&!s.closedAt);const sacasHoy=state.sacas.filter(s=>s.date===hoy&&s.closedAt);const sacasPendientes=state.sacas.filter(s=>s.closedAt&&s.failed>0&&!s.toColecta&&!state.sacas.find(r=>r.retryOf===s.id));const willTasa=(()=>{const hc=state.sacas.filter(s=>s.date===hoy&&s.closedAt),totA=sum(hc,s=>s.assigned),totE=sum(hc,s=>s.delivered);return totA>0?Math.round((totE/totA)*100):null;})();return{hoy,conteoHoy,colectaHoy,totalConteoHoy,totalColectaHoy,sacaAbierta,sacasHoy,sacasPendientes,willTasa};}
function stepUp(id){const el=document.getElementById(id);el.value=Math.max(0,(parseInt(el.value)||0)+1);}
function stepDown(id){const el=document.getElementById(id);el.value=Math.max(0,(parseInt(el.value)||0)-1);}
function cntUp(id){const el=document.getElementById(id);el.value=Math.max(0,(parseInt(el.value)||0)+1);el.select();}
function cntDown(id){const el=document.getElementById(id);el.value=Math.max(0,(parseInt(el.value)||0)-1);el.select();}
function willSync(cId,oId,total){const c=document.getElementById(cId),o=document.getElementById(oId);let v=Math.max(0,Math.min(total,parseInt(c.value)||0));c.value=v;o.value=Math.max(0,total-v);const chk=document.getElementById("will-check");if(chk){const s=v+(parseInt(o.value)||0);chk.textContent=s+" / "+total;chk.style.color=s===total?"#22C55E":"#F59E0B";}}
function willAdjustUp(id,oId,total){const el=document.getElementById(id);el.value=Math.min(total,(parseInt(el.value)||0)+1);willSync(id,oId,total);}
function willAdjust(id,oId,total){const el=document.getElementById(id);el.value=Math.max(0,(parseInt(el.value)||0)-1);willSync(id,oId,total);}
function renderAll(){const D=deriveData();document.getElementById("badge-will").classList.toggle("hidden",D.sacasPendientes.length===0);const colPend=Object.keys(CARRIERS).filter(k=>D.conteoHoy.find(c=>c.carrier===k)&&!D.colectaHoy.find(c=>c.carrier===k));document.getElementById("badge-col").textContent=colPend.length;document.getElementById("badge-col").classList.toggle("hidden",colPend.length===0);const tfAct=(state.hubOrders||[]).filter(o=>!TF_FINAL.includes(o.status));document.getElementById("badge-tf").textContent=tfAct.length||"";document.getElementById("badge-tf").classList.toggle("hidden",tfAct.length===0);renderDashboard(D);renderConteo(D);renderWill(D);renderColecta(D);renderTF();renderReporte(D);}
function renderDashboard(D){const{hoy,conteoHoy,colectaHoy,totalConteoHoy,totalColectaHoy,sacaAbierta,willTasa}=D;const willDays=dateRange(14).map(d=>{const closed=state.sacas.filter(s=>s.date===d&&s.closedAt),totA=sum(closed,s=>s.assigned),totE=sum(closed,s=>s.delivered);return{day:fmtD(d),val:totA>0?Math.round((totE/totA)*100):null};});const withData=willDays.filter(d=>d.val!==null),avg14=withData.length>0?Math.round(sum(withData,d=>d.val)/withData.length):null;let streak=0;for(let i=willDays.length-2;i>=0;i--){if(willDays[i].val===100)streak++;else if(willDays[i].val!==null)break;}const goalColor=willTasa===null?C.muted:willTasa===100?C.limeD:willTasa>=80?C.amber:C.red;const statusBg=willTasa===100?"#E6FFB2":willTasa!==null?"#FFF3CD":"#F5F4F0";const statusBdr=willTasa===100?"#C8FF00":willTasa>=80?C.amber:willTasa!==null?C.red:"#CCC";const willMsg=willTasa===null?"Sin saca registrada hoy":willTasa===100?"🎯 META CUMPLIDA — 100% HOY":sacaAbierta?`Saca en curso — ${sacaAbierta.assigned} paquetes`:`${willTasa}% de entrega hoy`;const dailyChart=dateRange(7).map(d=>({label:fmtD(d),v:sum(state.conteos.filter(c=>c.date===d),c=>(c.do||0)+(c.pu||0)),color:C.blue}));const tfToday=(state.hubOrders||[]).filter(o=>o.createdAt>=new Date().setHours(0,0,0,0));document.getElementById("panel-dashboard").innerHTML=`<div class="ctx"><span style="font-size:16px;">📊</span><div><div class="ctx-title">Dashboard general</div><div class="ctx-sub">Vista consolidada del Hub</div></div><span class="ctx-pill cp-white">Hoy · ${new Date().toLocaleDateString("es-CL",{weekday:"short",day:"numeric",month:"short"})}</span></div><div class="will-wrap"><div class="will-top"><span style="font-size:26px;">🚲</span><div><div class="will-name">Will — Repartidor</div><div class="will-sub">Long John · Polígono Las Condes · Meta: 100%</div></div><div class="will-pct" style="color:${goalColor};">${willTasa!==null?willTasa+"%":"—"}</div></div><div class="will-body"><div class="will-msg" style="background:${statusBg};border-color:${statusBdr};color:${goalColor};">${willMsg}</div><div class="will-kpis">${(()=>{const hc=state.sacas.filter(s=>s.date===hoy&&s.closedAt),totA=sum(hc,s=>s.assigned)||(sacaAbierta?.assigned||0),totE=sum(hc,s=>s.delivered),totF=sum(hc,s=>s.failed);return[["Asignados",totA||"—",C.ink],["Entregados",totE||"—",C.green],["Fallidos",totF||"—",C.red],["Racha 100%",streak>0?streak+"d":"—",C.blue],["Prom 14d",avg14!==null?avg14+"%":"—",C.muted]].map(([l,v,c])=>`<div class="wk"><div class="wkv" style="color:${c};">${v}</div><div class="wkl">${l}</div></div>`).join("");})()}</div><div class="sl">Tendencia 14 días</div><div class="trend-wrap">${trendSVG(willDays,v=>v===100?C.lime:v>=80?C.amber:C.red)}</div><div style="display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:#888;font-weight:600;"><span>${willDays[0]?.day}</span><span>${willDays[willDays.length-1]?.day}</span></div></div></div><div class="st">Resumen del Hub — hoy</div><div class="kpi-row"><div class="kpi"><div class="kn" style="color:${C.blue};">${totalConteoHoy}</div><div class="kl">Paquetes contados</div><div class="ks">listos para colecta</div></div><div class="kpi"><div class="kn" style="color:${C.green};">${totalColectaHoy}</div><div class="kl">Salieron en colecta</div><div class="ks">confirmados hoy</div></div><div class="kpi"><div class="kn" style="color:${C.amber};">${Math.max(0,totalConteoHoy-totalColectaHoy)}</div><div class="kl">Pendientes salida</div><div class="ks">en el hub aún</div></div><div class="kpi"><div class="kn" style="color:${C.pink};">${tfToday.length}</div><div class="kl">Turbo &amp; Flex hoy</div><div class="ks">órdenes propias</div></div></div><div class="st">Por transportista — hoy</div><div class="carrier-grid">${Object.entries(CARRIERS).map(([k,c])=>{const conteo=conteoHoy?.find?.(x=>x.carrier===k),colecta=colectaHoy?.find?.(x=>x.carrier===k),doCnt=conteo?.do||0,puCnt=conteo?.pu||0,total=doCnt+puCnt,col=colecta?.count||0;return`<div class="ccard"><div class="ccard-name">${cb(k)}${c.name}</div><div class="ccard-nums"><div class="cn"><div class="cn-val" style="color:${C.blue};">${k==="pi"?'<span style="color:#CCC;font-size:16px;">🚫</span>':doCnt}</div><div class="cn-lbl">Drop Off</div></div><div class="cn"><div class="cn-val" style="color:${C.green};">${puCnt}</div><div class="cn-lbl">Pick Up</div></div><div class="cn"><div class="cn-val" style="color:${col>0?C.green:C.muted};">${col}</div><div class="cn-lbl">Salieron</div></div><div class="cn"><div class="cn-val" style="color:${total-col>0?C.amber:C.muted};">${Math.max(0,total-col)}</div><div class="cn-lbl">Pendientes</div></div></div></div>`;}).join("")}</div><div class="card"><div class="st">Volumen últimos 7 días</div>${barChartHTML(dailyChart)}</div>`;}

const histDays=dateRange(6).slice(0,5).map(d=>({date:d,carriers:Object.entries(CARRIERS).map(([k,c])=>({k,c,rec:state.conteos.find(e=>e.date===d&&e.carrier===k)||{do:0,pu:0}}))})).filter(d=>d.carriers.some(c=>(c.rec.do||0)+(c.rec.pu||0)>0));

function renderReporte(D){const periodos=[{id:"week",label:"Esta semana"},{id:"month",label:"Este mes"},{id:"prev",label:"Mes anterior"},{id:"all",label:"Todo el tiempo"}];const now=new Date();let desde,hasta=todayStr();if(reportePeriod==="week"){const d=new Date();d.setDate(d.getDate()-6);desde=d.toLocaleDateString("es-CL",{timeZone:"America/Santiago"}).split("/").reverse().join("-");}else if(reportePeriod==="month"){desde=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-01`;}else if(reportePeriod==="prev"){const pm=new Date(now.getFullYear(),now.getMonth()-1,1);desde=`${pm.getFullYear()}-${String(pm.getMonth()+1).padStart(2,"0")}-01`;const ld=new Date(now.getFullYear(),now.getMonth(),0);hasta=ld.toLocaleDateString("es-CL",{timeZone:"America/Santiago"}).split("/").reverse().join("-");}else{desde="2020-01-01";}const inR=arr=>arr.filter(x=>x.date>=desde&&x.date<=hasta);const conteos=inR(state.conteos),colectas=inR(state.colectas),sacas=inR(state.sacas).filter(s=>s.closedAt);const totalConteo=sum(conteos,c=>(c.do||0)+(c.pu||0)),totalColecta=sum(colectas,c=>c.count);const sacaAsig=sum(sacas,s=>s.assigned),sacaEnt=sum(sacas,s=>s.delivered),sacaFail=sum(sacas,s=>s.failed);const willPct=sacaAsig>0?Math.round((sacaEnt/sacaAsig)*100):null;const carrierData=Object.entries(CARRIERS).map(([k,c])=>({k,c,doT:sum(conteos.filter(x=>x.carrier===k),x=>x.do||0),puT:sum(conteos.filter(x=>x.carrier===k),x=>x.pu||0),conteo:sum(conteos.filter(x=>x.carrier===k),x=>(x.do||0)+(x.pu||0)),colecta:sum(colectas.filter(x=>x.carrier===k),x=>x.count)}));const inRTS=arr=>arr.filter(o=>{const d=new Date(o.createdAt),ds=parseD(desde),de=parseD(hasta);de.setHours(23,59,59);return d>=ds&&d<=de;});const tfOrds=inRTS(state.hubOrders||[]),tfNeto=sum(tfOrds,o=>o.pricePerPkg*o.packages.length);document.getElementById("panel-reporte").innerHTML=`<div class="ctx"><span style="font-size:16px;">📈</span><div><div class="ctx-title">Reportes y métricas</div><div class="ctx-sub">Volumen y rendimiento por período</div></div><span class="ctx-pill cp-blue">${periodos.find(p=>p.id===reportePeriod)?.label||"Período"}</span></div><div class="period-bar">${periodos.map(p=>`<button class="pchip ${reportePeriod===p.id?"active":""}" onclick="setPeriod('${p.id}')">${p.label}</button>`).join("")}</div><div class="kpi-row"><div class="kpi"><div class="kn" style="color:${C.blue};">${totalConteo}</div><div class="kl">Paquetes registrados</div><div class="ks">conteo período</div></div><div class="kpi"><div class="kn" style="color:${C.green};">${totalColecta}</div><div class="kl">Paquetes salieron</div><div class="ks">confirmados colecta</div></div><div class="kpi"><div class="kn" style="color:${willPct===100?C.limeD:willPct!==null?C.amber:C.muted};">${willPct!==null?willPct+"%":"—"}</div><div class="kl">Tasa Will</div><div class="ks">entrega período</div></div><div class="kpi"><div class="kn" style="color:${C.pink};">${tfOrds.length}</div><div class="kl">Turbo &amp; Flex</div><div class="ks">${fmtCLP(tfNeto)} neto</div></div></div><div class="card"><div class="st">Desglose por transportista</div><table class="tbl"><thead><tr><th>Transportista</th><th style="text-align:center;">📤 DO</th><th style="text-align:center;">📥 PU</th><th style="text-align:center;">Total</th><th style="text-align:center;">Salieron</th><th style="text-align:center;">Dif.</th></tr></thead><tbody>${carrierData.map(({k,c,doT,puT,conteo,colecta})=>`<tr><td>${cb(k)} ${c.name}</td><td style="text-align:center;"><strong style="font-family:'Fraunces',serif;font-size:18px;color:${C.blue};">${k==="pi"?"🚫":doT}</strong></td><td style="text-align:center;"><strong style="font-family:'Fraunces',serif;font-size:18px;color:${C.green};">${puT}</strong></td><td style="text-align:center;"><strong style="font-family:'Fraunces',serif;font-size:18px;">${conteo}</strong></td><td style="text-align:center;"><strong style="font-family:'Fraunces',serif;font-size:18px;color:${C.green};">${colecta}</strong></td><td style="text-align:center;color:${conteo-colecta>0?C.amber:C.muted};font-weight:700;">${conteo-colecta>0?"+"+(conteo-colecta):"✓"}</td></tr>`).join("")}<tr style="background:#F8F8F6;border-top:2px solid #0A0A0B;"><td><strong>TOTAL</strong></td><td style="text-align:center;"><strong style="font-family:'Fraunces',serif;font-size:18px;color:${C.blue};">${sum(carrierData,r=>r.doT)}</strong></td><td style="text-align:center;"><strong style="font-family:'Fraunces',serif;font-size:18px;color:${C.green};">${sum(carrierData,r=>r.puT)}</strong></td><td style="text-align:center;"><strong style="font-family:'Fraunces',serif;font-size:20px;">${totalConteo}</strong></td><td style="text-align:center;"><strong style="font-family:'Fraunces',serif;font-size:20px;color:${C.green};">${totalColecta}</strong></td><td></td></tr></tbody></table></div><div class="card"><div class="st">Rendimiento Will — período</div><div style="display:flex;gap:24px;flex-wrap:wrap;"><div><div style="font-family:'Fraunces',serif;font-size:42px;font-weight:900;color:${C.amber};">${sacaAsig}</div><div style="font-size:13px;color:#666;font-weight:700;">Asignados</div></div><div><div style="font-family:'Fraunces',serif;font-size:42px;font-weight:900;color:${C.green};">${sacaEnt}</div><div style="font-size:13px;color:#666;font-weight:700;">Entregados</div></div><div><div style="font-family:'Fraunces',serif;font-size:42px;font-weight:900;color:${C.red};">${sacaFail}</div><div style="font-size:13px;color:#666;font-weight:700;">Fallidos</div></div><div><div style="font-family:'Fraunces',serif;font-size:42px;font-weight:900;color:${willPct===100?C.limeD:C.amber};">${willPct!==null?willPct+"%":"—"}</div><div style="font-size:13px;color:#666;font-weight:700;">Tasa período</div></div></div></div><div class="card"><div class="st">Turbo &amp; Flex — período</div><div style="display:flex;gap:24px;flex-wrap:wrap;"><div><div style="font-family:'Fraunces',serif;font-size:42px;font-weight:900;color:${C.blue};">${tfOrds.filter(o=>o.type==="turbo").length}</div><div style="font-size:13px;color:#666;font-weight:700;">⚡ Órdenes Turbo</div></div><div><div style="font-family:'Fraunces',serif;font-size:42px;font-weight:900;color:${C.purple};">${tfOrds.filter(o=>o.type==="flex").length}</div><div style="font-size:13px;color:#666;font-weight:700;">📅 Órdenes Flex</div></div><div><div style="font-family:'Fraunces',serif;font-size:28px;font-weight:900;color:${C.pink};">${fmtCLP(tfNeto)}</div><div style="font-size:13px;color:#666;font-weight:700;">Neto facturado</div></div></div></div>`;}
